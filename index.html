<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --green: #00d2a0;
    --blue: #4facfe;
    --pink: #f093fb;
    --orange: #f5576c;
    --yellow: #ffd93d;
    --cyan: #00f2fe;
    --red: #ff6b6b;
    --lime: #a8e063;
  }

  body {
    font-family: 'Heebo', 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow-1 { top: -200px; right: -100px; background: var(--accent); }
  .bg-glow-2 { bottom: -200px; left: -100px; background: var(--blue); }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header h1 {
    font-size: 3.2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #6c5ce7, #4facfe, #f093fb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .header .subtitle {
    color: var(--text-dim);
    font-size: 1.15rem;
    font-weight: 300;
  }

  .header .subtitle strong {
    color: var(--text);
    font-weight: 600;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 32px;
    text-align: center;
    min-width: 160px;
    transition: all 0.3s;
  }

  .stat-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 30px var(--accent-glow);
    transform: translateY(-2px);
  }

  .stat-number {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 4px;
    font-weight: 400;
  }

  /* Search & Filter */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .search-box {
    position: relative;
    width: 100%;
    max-width: 600px;
  }

  .search-box input {
    width: 100%;
    padding: 16px 24px 16px 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: all 0.3s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 30px var(--accent-glow);
  }

  .search-box input::placeholder {
    color: var(--text-dim);
  }

  .search-icon {
    position: absolute;
    inset-inline-start: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 1.2rem;
  }

  .filter-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 1200px;
  }

  .filter-tag {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    user-select: none;
    white-space: nowrap;
  }

  .filter-tag:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .filter-tag.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .filter-tag .count {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 1px 8px;
    font-size: 0.75rem;
    margin-inline-start: 6px;
  }

  .filter-tag.active .count {
    background: rgba(255,255,255,0.25);
  }

  /* Results count */
  .results-info {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  .results-info span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Grid */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px 18px;
    transition: all 0.3s;
    cursor: default;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .skill-card::before {
    content: '';
    position: absolute;
    top: 0;
    inset-inline-start: 0;
    width: 4px;
    height: 100%;
    border-radius: 0 4px 4px 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .skill-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3), 0 0 20px var(--accent-glow);
    transform: translateY(-2px);
  }

  .skill-card:hover::before {
    opacity: 1;
  }

  .skill-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .skill-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    flex-shrink: 0;
  }

  .skill-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    direction: ltr;
    text-align: left;
    font-family: 'Inter', 'SF Mono', monospace;
  }

  .skill-desc-he {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 6px;
    font-weight: 400;
  }

  .skill-desc-en {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.5;
    direction: ltr;
    text-align: left;
    font-family: 'Inter', sans-serif;
  }

  .skill-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 14px;
    gap: 8px;
  }

  .skill-category-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 10px;
    background: rgba(255, 217, 61, 0.12);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-size: 0.78rem;
    font-family: 'Inter', 'SF Mono', monospace;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 600;
  }

  .copy-btn:hover {
    background: var(--yellow);
    color: #111;
    border-color: var(--yellow);
    box-shadow: 0 0 20px rgba(255, 217, 61, 0.35);
    transform: scale(1.05);
  }

  .copy-btn.copied {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
    box-shadow: 0 0 16px rgba(0, 210, 160, 0.3);
  }

  .copy-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .cat-ads .skill-icon, .cat-ads .skill-category-badge { background: rgba(245, 87, 108, 0.15); color: var(--orange); }

  .cat-seo::before { background: var(--green); }
  .cat-cro .skill-icon, .cat-cro .skill-category-badge { background: rgba(79, 172, 254, 0.15); color: var(--blue); }

  .cat-content .skill-icon, .cat-content .skill-category-badge { background: rgba(240, 147, 251, 0.15); color: var(--pink); }

  .cat-leads .skill-icon, .cat-leads .skill-category-badge { background: rgba(255, 107, 107, 0.15); color: var(--red); }

  .cat-sales .skill-icon, .cat-sales .skill-category-badge { background: rgba(255, 217, 61, 0.15); color: #e0a800; }

  .cat-integrations .skill-icon, .cat-integrations .skill-category-badge { background: rgba(0, 210, 160, 0.15); color: #00b894; }

  .cat-ideas .skill-icon, .cat-ideas .skill-category-badge { background: rgba(255, 217, 61, 0.15); color: var(--yellow); }

  .cat-builtin .skill-icon, .cat-builtin .skill-category-badge { background: rgba(136, 136, 160, 0.15); color: var(--text-dim); }
  .cat-builtin::before { background: var(--text-dim); }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #fff;
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .no-results .emoji {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .no-results p {
    font-size: 1.1rem;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 60px;
    padding: 24px;
    color: var(--text-dim);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 768px) {
    .header h1 { font-size: 2.2rem; }
    .stats-row { gap: 12px; }
    .stat-card { padding: 16px 20px; min-width: 100px; }
    .stat-number { font-size: 1.8rem; }
    .skills-grid { grid-template-columns: 1fr; }
    .container { padding: 20px 16px; }
    .skill-footer { flex-direction: column; align-items: flex-start; }
  }
</style>

// State
let activeFilter = "all";
let searchQuery = "";

// Toast
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// Build filter tags
function buildFilters() {
  const container = document.getElementById("filterTags");
  const cats = {};
  skills.forEach(s => { cats[s.cat] = (cats[s.cat] || 0) + 1; });

  let html = `<div class="filter-tag active" data-cat="all">\u05d4\u05db\u05dc<span class="count">${skills.length}</span></div>`;
  Object.keys(catConfig).forEach(cat => {
    if (cats[cat]) {
      html += `<div class="filter-tag" data-cat="${cat}">${catConfig[cat].he}<span class="count">${cats[cat]}</span></div>`;
    }
  });
  container.innerHTML = html;

  container.querySelectorAll(".filter-tag").forEach(tag => {
    tag.addEventListener("click", () => {
      container.querySelectorAll(".filter-tag").forEach(t => t.classList.remove("active"));
      tag.classList.add("active");
      activeFilter = tag.dataset.cat;
      render();
    });
  });
}

// Render skills
function render() {
  const grid = document.getElementById("skillsGrid");
  const noResults = document.getElementById("noResults");
  const resultsInfo = document.getElementById("resultsInfo");

  const filtered = skills.filter(s => {
    const matchCat = activeFilter === "all" || s.cat === activeFilter;
    const matchSearch = !searchQuery ||
      s.name.toLowerCase().includes(searchQuery) ||
      s.he.includes(searchQuery) ||
      s.en.toLowerCase().includes(searchQuery) ||
      s.catHe.includes(searchQuery);
    return matchCat && matchSearch;
  });

  document.getElementById("visibleCount").textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = "";
    noResults.style.display = "block";
    resultsInfo.innerHTML = "";
    return;
  }

  noResults.style.display = "none";

  if (searchQuery || activeFilter !== "all") {
    resultsInfo.innerHTML = `\u05de\u05e6\u05d9\u05d2 <span>${filtered.length}</span> \u05de\u05ea\u05d5\u05da <span>${skills.length}</span> \u05e1\u05e7\u05d9\u05dc\u05d9\u05dd`;
  } else {
    resultsInfo.innerHTML = "";
  }

  grid.innerHTML = filtered.map(s => {
    const cc = catConfig[s.cat] || { class: "cat-builtin" };
    return `
      <div class="skill-card ${cc.class}">
        <div class="skill-card-header">
          <div class="skill-icon">${skills.find(sk => sk.name === s.name)?.catHe === s.catHe ? catConfig[s.cat]?.icon || '' : ''}</div>
          <div class="skill-name">${s.name}</div>
        </div>
        <div class="skill-desc-he">${s.he}</div>
        <div class="skill-desc-en">${s.en}</div>
        <div class="skill-footer">
          <div class="skill-category-badge">${s.catHe}</div>
          <div style="display:flex;gap:6px;align-items:center">
            ${skillRepos[s.name] ? `<a href="${skillRepos[s.name]}" target="_blank" class="copy-btn" style="text-decoration:none;background:#24292e;display:inline-flex;align-items:center;gap:4px">
              <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              <span>GitHub</span>
            </a>` : ''}
            <button class="copy-btn" onclick="copySkill(this, '${s.name}')">
              ${copyIcon}
              <span>\u05d4\u05e2\u05ea\u05e7 \u05e4\u05e7\u05d5\u05d3\u05d4</span>
            </button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function copySkill(btn, name) {
  const cmd = "/" + name;
  navigator.clipboard.writeText(cmd).then(() => {
    btn.innerHTML = checkIcon + '<span>\u05d4\u05d5\u05e2\u05ea\u05e7!</span>';
    btn.classList.add("copied");
    showToast('\u2705 \u05d4\u05e4\u05e7\u05d5\u05d3\u05d4 /' + name + ' \u05d4\u05d5\u05e2\u05ea\u05e7\u05d4 \u05dc\u05dc\u05d5\u05d7');
    setTimeout(() => {
      btn.innerHTML = copyIcon + '<span>\u05d4\u05e2\u05ea\u05e7 \u05e4\u05e7\u05d5\u05d3\u05d4</span>';
      btn.classList.remove("copied");
    }, 2000);
  });
}

// Search - also searches Hebrew
document.getElementById("searchInput").addEventListener("input", (e) => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

// Init
document.getElementById("totalCount").textContent = skills.length;
document.getElementById("catCount").textContent = Object.keys(catConfig).length;
buildFilters();
render();
</script>
